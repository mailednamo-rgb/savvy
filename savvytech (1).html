<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Avon Lab – Savvy Tech</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .screen {
    display: none;
    width: 100%;
    max-width: 430px;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }
  .screen.active { display: block; }

  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* ══ PANTALLA 1 ══ */
  /* Invisible clickable button perfectly overlaid on the image button */
  #screen1 .btn-overlay {
    position: absolute;
    top: 91%;
    left: 26%;
    width: 48%;
    height: 7%;
    cursor: pointer;
    border-radius: 50px;
    background: transparent;
    border: none;
    -webkit-tap-highlight-color: rgba(229,0,109,0.15);
  }
  #screen1 .btn-overlay:active {
    background: rgba(229,0,109,0.15);
  }

  /* ══ PANTALLA 2 ══ */
  /* Invisible clickable checkboxes over the image */
  #screen2 .overlay {
    position: absolute;
    inset: 0;
  }

  .check-hit {
    position: absolute;
    left: 8%;
    width: 40%;
    height: 6%;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #check-area-1 { top: 39%; }
  #check-area-2 { top: 70%; }

  .fake-check {
    width: 7vw;
    height: 7vw;
    max-width: 32px;
    max-height: 32px;
    border: 2.5px solid #e5006d;
    border-radius: 4px;
    flex-shrink: 0;
    background: white;
    position: relative;
    transition: background 0.15s;
  }

  .fake-check.checked {
    background: #e5006d;
  }

  .fake-check.checked::after {
    content: '';
    position: absolute;
    left: 22%;
    top: 5%;
    width: 38%;
    height: 60%;
    border: 2.5px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  .check-label {
    font-family: Arial, sans-serif;
    font-size: clamp(12px, 3.5vw, 16px);
    color: #e5006d;
    font-weight: 400;
    user-select: none;
  }

  /* ENVIAR button overlay on screen 2 */
  #screen2 .btn-overlay {
    position: absolute;
    top: 90.5%;
    left: 18%;
    width: 64%;
    height: 6.5%;
    cursor: pointer;
    border-radius: 50px;
    background: transparent;
    border: none;
    -webkit-tap-highlight-color: rgba(229,0,109,0.15);
    transition: background 0.15s;
  }
  #screen2 .btn-overlay:disabled {
    cursor: not-allowed;
  }
  #screen2 .btn-overlay:not(:disabled):active {
    background: rgba(229,0,109,0.15);
  }
</style>
</head>

<script>
  var state = [false, false];

  function toggle(n) {
    state[n-1] = !state[n-1];
    document.getElementById('fc'+n).classList.toggle('checked', state[n-1]);
    document.getElementById('btnEnviar').disabled = !(state[0] && state[1]);
  }

  function goTo(n) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById('screen' + n).classList.add('active');
  }
</script>
