<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Avon Lab – Savvy Tech</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#fff;
    height:100dvh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
  }
  .screen {
    display:none;
    width:100%;
    max-width:430px;
    height:100dvh;
    position:relative;
    overflow:hidden;
  }
  .screen.active { display:block; }
  .bg {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center top;
  }

  /* ── SCREEN 1: invisible button over image ── */
  #s1-btn {
    position:absolute;
    top:91%;
    left:26%;
    width:48%;
    height:7%;
    cursor:pointer;
    border-radius:50px;
    background:transparent;
    border:none;
    -webkit-tap-highlight-color:rgba(229,0,109,0.15);
  }
  #s1-btn:active { background:rgba(229,0,109,0.18); }

  /* ── SCREEN 2 ── */
  #screen2 {
    background:#fff;
    display:none;
    flex-direction:column;
    align-items:stretch;
  }
  #screen2.active { display:flex; }

  .s2-logo {
    width:100%;
    display:block;
  }

  .s2-block {
    padding: 0 7% 0;
    display:flex;
    flex-direction:column;
    gap: 2vw;
  }

  .s2-task-img {
    width:100%;
    display:block;
  }

  /* The checkbox row: replaces "Aprobado / No aprobado" rows */
  .check-row {
    display:flex;
    align-items:center;
    gap: 3.5vw;
    padding: 0 2% 3vw;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }

  .fake-check {
    width:7vw;
    height:7vw;
    max-width:32px;
    max-height:32px;
    border:2.5px solid #e5006d;
    border-radius:4px;
    flex-shrink:0;
    background:white;
    position:relative;
    transition:background 0.15s;
  }
  .fake-check.checked { background:#e5006d; }
  .fake-check.checked::after {
    content:'';
    position:absolute;
    left:22%; top:5%;
    width:38%; height:60%;
    border:2.5px solid #fff;
    border-top:none; border-left:none;
    transform:rotate(45deg);
  }

  .check-label {
    font-family:'Montserrat', sans-serif;
    font-size:clamp(13px, 3.8vw, 17px);
    color:#e5006d;
    font-weight:400;
    letter-spacing:0.01em;
  }

  .s2-spacer { flex:1; }

  .s2-btn-wrap {
    display:flex;
    justify-content:center;
    padding-bottom:6%;
  }

  .s2-btn-img {
    height: clamp(44px, 10vw, 56px);
    cursor:pointer;
    border:none;
    background:transparent;
    padding:0;
    opacity:1;
    transition:opacity 0.2s, transform 0.1s;
    -webkit-tap-highlight-color:transparent;
  }
  .s2-btn-img:disabled { opacity:0.35; cursor:not-allowed; }
  .s2-btn-img:not(:disabled):active { transform:scale(0.97); }
</style>
</head>
<body>

<script>
  var state=[false,false];
  function toggle(n){
    state[n-1]=!state[n-1];
    document.getElementById('fc'+n).classList.toggle('checked',state[n-1]);
    document.getElementById('btnEnviar').disabled=!(state[0]&&state[1]);
  }
  function goTo(n){
    document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
    document.getElementById('screen'+n).classList.add('active');
  }
</script>
