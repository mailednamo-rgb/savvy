  /* ── PANTALLA 2 ── */
  #screen2 {
    background: #fff;
    padding: 0 32px 40px;
    justify-content: space-between;
  }

  .screen2-header {
    padding-top: 28px;
    text-align: center;
    border-bottom: none;
  }

  .avon-logo {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #e5006d;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .savvy-logo {
    font-family: 'Montserrat', sans-serif;
    font-size: 34px;
    font-weight: 900;
    color: #e5006d;
    letter-spacing: -1px;
    line-height: 1;
    font-style: italic;
  }

  .tasks {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 40px;
  }

  .task { display: flex; flex-direction: column; gap: 16px; }

  .task-title {
    font-size: 22px;
    font-weight: 900;
    color: #e5006d;
    line-height: 1.15;
    text-transform: uppercase;
  }

  .task-check {
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
  }

  .task-check input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 32px;
    height: 32px;
    border: 2.5px solid #e5006d;
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }

  .task-check input[type="checkbox"]:checked {
    background: #e5006d;
  }

  .task-check input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 7px;
    top: 3px;
    width: 10px;
    height: 16px;
    border: 3px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  .task-check-label {
    font-size: 18px;
    color: #e5006d;
    font-weight: 400;
  }

  /* ── BOTONES ── */
  .btn {
    background: #e5006d;
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'Montserrat', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 18px 60px;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.1s, opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.97); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn:disabled:active { transform: none; }

<body>

<!-- PANTALLA 1 -->
<div id="screen1" class="screen active">
  <button class="btn" onclick="goTo(2)">COMENZAR</button>
</div>

<!-- PANTALLA 2 -->
<div id="screen2" class="screen">
  <div class="screen2-header">
    <div class="avon-logo">AVON LAB</div>
    <div class="savvy-logo">SAVVY TECH</div>
  </div>

  <div class="tasks">
    <div class="task">
      <div class="task-title">ULTRA<br>PODER CUBRITIVO</div>
      <label class="task-check">
        <input type="checkbox" id="check1" onchange="updateBtn()">
        <span class="task-check-label">Aprobado</span>
      </label>
    </div>

    <div class="task">
      <div class="task-title">ULTRA<br>PIGMENTACIÓN<br>Y ACABADO</div>
      <label class="task-check">
        <input type="checkbox" id="check2" onchange="updateBtn()">
        <span class="task-check-label">Aprobado</span>
      </label>
    </div>
  </div>

  <button class="btn" id="btnEnviar" onclick="goTo(3)" disabled>ENVIAR</button>
</div>

<!-- PANTALLA 3 -->
<div id="screen3" class="screen">
</div>

<script>
  function goTo(n) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen' + n).classList.add('active');
  }

  function updateBtn() {
    const c1 = document.getElementById('check1').checked;
    const c2 = document.getElementById('check2').checked;
    document.getElementById('btnEnviar').disabled = !(c1 && c2);
  }
</script>

</body>
</html>
